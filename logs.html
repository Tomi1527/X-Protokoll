<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>LSPD Login Logs</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script>
  if(sessionStorage.getItem('loggedIn') !== 'true'){
    window.location.href = "index.html";
  }
</script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #000000;
      margin: 0;
      padding: 40px;
      color: #f1f5f9;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 30px;
      color: #e2e8f0;
    }

    .table-container {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(30, 41, 59, 0.9);
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.6);
      overflow-x: auto;
      backdrop-filter: blur(10px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      color: #f1f5f9;
    }

    thead {
      background: rgba(51, 65, 85, 0.8);
      color: #e2e8f0;
    }

    th, td {
      padding: 14px 12px;
      text-align: left;
    }

    th {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    tr:hover {
      background: rgba(51, 65, 85, 0.5);
      transition: 0.2s ease;
    }

    .username {
      color: #60a5fa;
      cursor: pointer;
      text-decoration: underline;
    }

    .logins-list {
      margin: 10px 0 20px 20px;
      padding: 10px;
      background: rgba(15, 23, 42, 0.8);
      border-left: 3px solid #60a5fa;
      border-radius: 6px;
      display: none;
    }

    .logins-list ul {
      margin: 0;
      padding-left: 18px;
    }

    .logins-list li {
      margin: 4px 0;
      font-size: 0.9rem;
      color: #cbd5e1;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .tag.success {
      background: rgba(5, 150, 105, 0.8);
      color: #d1fae5;
    }

    .tag.failure {
      background: rgba(220, 38, 38, 0.8);
      color: #fecaca;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px 15px;
      background: rgba(59, 130, 246, 0.8);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: rgba(59, 130, 246, 1);
    }

  </style>
</head>
<body>
  <button class="back-btn" onclick="window.location.href='logauswahl.html'">
    <i class="fas fa-arrow-left mr-1"></i>Zurück
  </button>
  <h1><i class="fas fa-user-shield mr-2"></i>LSPD Login Übersicht</h1>
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Username</th>
          <th>Letzter Login</th>
        </tr>
      </thead>
      <tbody id="userTable"></tbody>
    </table>
  </div>

  <script>
    const { createClient } = supabase
    const supabaseUrl = ""
    const supabaseKey = ""                     // dein anon key
    const client = createClient(supabaseUrl, supabaseKey)

    let allLogins = []

    async function loadLogins() {
      const { data, error } = await client
        .from("logins")
        .select("username, timestamp, success")
        .order("timestamp", { ascending: false })

      if (error) {
        console.error(error)
        return
      }

      allLogins = data

      const userMap = {}
      data.forEach(row => {
        if (!userMap[row.username]) {
          userMap[row.username] = row.timestamp
        }
      })

      const table = document.getElementById("userTable")
      table.innerHTML = ""

      Object.entries(userMap).forEach(([username, lastLogin]) => {
        const tr = document.createElement("tr")
        tr.innerHTML = `
          <td><span class="username" onclick="toggleLogins('${username}')">${username}</span></td>
          <td>${new Date(lastLogin).toLocaleString()}</td>
        `
        table.appendChild(tr)

        const detailRow = document.createElement("tr")
        detailRow.innerHTML = `
          <td colspan="2">
            <div id="logins-${username}" class="logins-list"></div>
          </td>
        `
        table.appendChild(detailRow)
      })
    }

    function toggleLogins(username) {
  const container = document.getElementById(`logins-${username}`)
  if (container.style.display === "block") {
    container.style.display = "none"
    return
  }

  const userLogins = allLogins.filter(l => l.username === username)

  container.innerHTML = `
    <strong>Logins von ${username}:</strong>
    <ul>
      ${userLogins.map(l => `
        <li>
          ${new Date(l.timestamp).toLocaleString()}
          <span class="tag ${l.success ? "success" : "fail"}">
            ${l.success ? "Erfolgreich" : "Fehlgeschlagen"}
          </span>
        </li>
      `).join("")}
    </ul>
  `
  container.style.display = "block"
}


    loadLogins()
  </script>
</body>
</html>
